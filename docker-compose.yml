services:

  db:
    image: postgres:17
    environment:
      TZ: Asia/Tokyo
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    command : bash -c "bundle exec rails db:prepare && rm -f tmp/pids/server.pid && ./bin/dev"
    container_name: ballpark_note_container
    tty: true
    stdin_open: true
    volumes: 
     - .:/rails
     - bundle_data:/usr/local/bundle:cached
      
    environment:
      TZ: Asia/Tokyo
      RAILS_ENV: development
    ports: 
     - "3000:3000"
    depends_on:
      - db

volumes:
  pgdata:
  bundle_data: